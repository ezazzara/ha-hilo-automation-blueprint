blueprint:
  name: Hilo Challenge Control – AM/PM Strategy
  description: >
    Controls heating for Hilo challenges (preheat, reduction, comfort recovery)
    with separate AM/PM temps, skip toggles, optional switches, and a restore scene.
  domain: automation
  min_version: "2024.6.0"

  input:
    # ――― General Settings ―――
    general_settings:
      name: "⚙️ General Settings"
      description: "Enable or skip challenges, and enable preheat"
      input:
        challenge_am:
          name: "Participate in AM Challenge"
          default: true
          selector:
            boolean:
        challenge_pm:
          name: "Participate in PM Challenge"
          default: true
          selector:
            boolean:
        skip_am:
          name: "Skip Next AM Challenge"
          default: false
          selector:
            boolean:
        skip_pm:
          name: "Skip Next PM Challenge"
          default: false
          selector:
            boolean:
        do_pre_heat:
          name: "Enable Preheat"
          default: true
          selector:
            boolean:

    # ――― Hilo Sensors ―――
    sensors:
      name: "🔗 Hilo Sensors"
      description: "Sensors that indicate preheat or peak in progress"
      input:
        preheat_entity:
          name: "Preheat Sensor"
          selector:
            entity:
              domain: binary_sensor
        peak_entity:
          name: "Peak in Progress Sensor"
          selector:
            entity:
              domain: binary_sensor

    # ――― Devices to Control ―――
    devices:
      name: "🔥 Devices & Switches"
      description: "Thermostats and optional switches to control during events"
      input:
        thermostats:
          name: "Thermostats"
          selector:
            entity:
              domain: climate
              multiple: true
        water_heater:
          name: "Water Heater (optional)"
          default: []
          selector:
            entity:
              domain: switch
              multiple: true
        other_switches:
          name: "Other Switches (optional)"
          default: []
          selector:
            entity:
              domain: switch
              multiple: true

    # ――― Temperature Strategy ―――
    temps:
      name: "🌡️ Temperature Strategy"
      description: "Define temps for normal, challenge (AM/PM), preheat, recovery"
      input:
        normal_temp:
          name: "Normal Temperature (°C)"
          default: 21
          selector:
            number:
              min: 10
              max: 30
              step: 0.5
        preheat_temp:
          name: "Preheat Temperature (°C)"
          default: 23
          selector:
            number:
              min: 10
              max: 30
              step: 0.5
        challenge_temp_am:
          name: "AM Challenge Temperature (°C)"
          default: 17
          selector:
            number:
              min: 10
              max: 25
              step: 0.5
        challenge_temp_pm:
          name: "PM Challenge Temperature (°C)"
          default: 17
          selector:
            number:
              min: 10
              max: 25
              step: 0.5
        appreciation_offset:
          name: "Comfort Recovery Offset (°C)"
          default: 2
          selector:
            number:
              min: 0
              max: 5
              step: 0.5
        recovery_duration:
          name: "Comfort Recovery Duration"
          default: "00:30:00"
          selector:
            duration:

    # ――― Scene Restore ―――
    scene_restore:
      name: "🎬 Restore Scene"
      description: "Scene to restore after comfort recovery"
      input:
        restore_scene:
          name: "Scene to Restore"
          selector:
            entity:
              domain: scene

# ===========================
# TRIGGERS
# ===========================
triggers:
  - platform: state
    entity_id: !input preheat_entity
  - platform: state
    entity_id: !input peak_entity

# ===========================
# VARIABLES
# ===========================
variables:
  challenge_am: !input general_settings.challenge_am
  challenge_pm: !input general_settings.challenge_pm
  skip_am: !input general_settings.skip_am
  skip_pm: !input general_settings.skip_pm
  do_pre_heat: !input general_settings.do_pre_heat
  thermostats: !input devices.thermostats
  water_heater: !input devices.water_heater
  other_switches: !input devices.other_switches
  preheat_entity: !input sensors.preheat_entity
  peak_entity: !input sensors.peak_entity
  normal_temp: !input temps.normal_temp
  preheat_temp: !input temps.preheat_temp
  challenge_temp_am: !input temps.challenge_temp_am
  challenge_temp_pm: !input temps.challenge_temp_pm
  appreciation_offset: !input temps.appreciation_offset
  recovery_duration: !input temps.recovery_duration
  restore_scene: !input scene_restore.restore_scene
  appreciation_temp_am: "{{ normal_temp + appreciation_offset }}"
  appreciation_temp_pm: "{{ normal_temp + appreciation_offset }}"

  # Determine which challenge temp to use
  effective_challenge_temp: >
    {% if challenge_am and not skip_am %}
      {{ challenge_temp_am }}
    {% elif challenge_pm and not skip_pm %}
      {{ challenge_temp_pm }}
    {% else %}
      {{ normal_temp }}
    {% endif %}

# ===========================
# ACTIONS
# ===========================
action:
  - choose:
      # 1️⃣ Challenge / Reduction Phase
      - conditions:
          - condition: state
            entity_id: !input peak_entity
            state: "on"
        sequence:
          - service: climate.set_temperature
            target:
              entity_id: !input devices.thermostats
            data:
              temperature: "{{ effective_challenge_temp }}"
          - choose:
              - conditions: "{{ water_heater | length > 0 }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input devices.water_heater
          - choose:
              - conditions: "{{ other_switches | length > 0 }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input devices.other_switches

      # 2️⃣ Preheat Phase
      - conditions:
          - condition: state
            entity_id: !input preheat_entity
            state: "on"
          - condition: template
            value_template: >
              {% if challenge_am %} {{ not skip_am }} {% elif challenge_pm %} {{ not skip_pm }} {% else %} false {% endif %}
        sequence:
          - service: climate.set_temperature
            target:
              entity_id: !input devices.thermostats
            data:
              temperature: !input temps.preheat_temp
          - choose:
              - conditions: "{{ water_heater | length > 0 }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input devices.water_heater
          - choose:
              - conditions: "{{ other_switches | length > 0 }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input devices.other_switches

    default:
      # 3️⃣ Comfort Recovery / Restore Scene
      - choose:
          - conditions:
              - condition: state
                entity_id: !input peak_entity
                state: "off"
          - condition: template
            value_template: >
              {% if challenge_am %} {{ not skip_am }} {% elif challenge_pm %} {{ not skip_pm }} {% else %} true {% endif %}
        sequence:
          - service: climate.set_temperature
            target:
              entity_id: !input devices.thermostats
            data:
              temperature: >
                {% if challenge_am %} {{ appreciation_temp_am }} {% else %} {{ appreciation_temp_pm }} {% endif %}
          - choose:
              - conditions: "{{ water_heater | length > 0 }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input devices.water_heater
          - choose:
              - conditions: "{{ other_switches | length > 0 }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input devices.other_switches
          - delay: !input temps.recovery_duration
          - service: scene.turn_on
            target:
              entity_id: !input scene_restore.restore_scene
