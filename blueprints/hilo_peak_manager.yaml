blueprint:
  name: Hilo Challenge Control - AM/PM with Skip & Recovery
  description: >
    Automates Hilo challenge phases with AM/PM temperature strategy, preheat, 
    comfort recovery, and optional scene restoration. Skip toggles allow 
    users to opt out of the next AM or PM challenge.

  domain: automation

  input:
    # ===========================
    # General Settings Section
    # ===========================
    general_section:
      section:
        name: "⚙️ General Settings"
        description: "Enable/skip participation in AM/PM challenges and preheat"
        collapsed: true

    challenge_am:
      name: "Participate in AM Challenge"
      description: "Skip AM challenge if toggled off"
      default: true
      selector:
        boolean:

    challenge_pm:
      name: "Participate in PM Challenge"
      description: "Skip PM challenge if toggled off"
      default: true
      selector:
        boolean:

    skip_am:
      name: "Skip Next AM Challenge"
      description: "User can opt out of the next AM challenge"
      default: false
      selector:
        boolean:

    skip_pm:
      name: "Skip Next PM Challenge"
      description: "User can opt out of the next PM challenge"
      default: false
      selector:
        boolean:

    do_pre_heat:
      name: "Enable Preheat"
      description: "Activate preheating before challenges"
      default: true
      selector:
        boolean:

    # ===========================
    # Hilo Sensors Section
    # ===========================
    sensors_section:
      section:
        name: "🔗 Hilo Sensors"
        description: "Sensors detecting preheat and peak events"
        collapsed: true

    preheat_entity:
      name: "Preheat Sensor"
      description: "Binary sensor ON when preheating is in progress"
      selector:
        entity:
          domain: binary_sensor

    peak_entity:
      name: "Peak in Progress Sensor"
      description: "Binary sensor ON during challenge/reduction phase"
      selector:
        entity:
          domain: binary_sensor

    # ===========================
    # Devices Section
    # ===========================
    devices_section:
      section:
        name: "🔥 Devices & Switches"
        description: "Thermostats and optional switches to control during challenges"
        collapsed: true

    thermostats:
      name: "Thermostats"
      description: "Thermostats to control during Hilo events"
      selector:
        entity:
          domain: climate
          multiple: true

    water_heater:
      name: "Water Heater (optional)"
      description: "Switch to disable during challenge/reduction phases"
      default: []
      selector:
        entity:
          domain: switch
          multiple: true

    other_switches:
      name: "Other Switches (optional)"
      description: "Additional switches to disable during challenge/reduction"
      default: []
      selector:
        entity:
          domain: switch
          multiple: true

    # ===========================
    # Temperature Strategy Section
    # ===========================
    temperature_section:
      section:
        name: "🌡️ Temperature Strategy"
        description: "Define temperatures for each phase and comfort recovery"
        collapsed: true

    normal_temp:
      name: "Normal Temperature"
      description: "Base temperature when no challenge is active"
      default: 21
      selector:
        number:
          min: 15
          max: 25
          step: 0.5
          unit_of_measurement: "°C"

    preheat_temp:
      name: "Preheat Temperature"
      description: "Temperature to use during preheat phase"
      default: 23
      selector:
        number:
          min: 15
          max: 25
          step: 0.5
          unit_of_measurement: "°C"

    challenge_temp_am:
      name: "AM Challenge Temperature"
      description: "Temperature during AM Hilo challenge"
      default: 17
      selector:
        number:
          min: 15
          max: 25
          step: 0.5
          unit_of_measurement: "°C"

    challenge_temp_pm:
      name: "PM Challenge Temperature"
      description: "Temperature during PM Hilo challenge"
      default: 17
      selector:
        number:
          min: 15
          max: 25
          step: 0.5
          unit_of_measurement: "°C"

    appreciation_offset:
      name: "Comfort Recovery Offset"
      description: "Added to normal temperature after peak for comfort recovery"
      default: 2
      selector:
        number:
          min: 0
          max: 5
          step: 0.5
          unit_of_measurement: "°C"

    recovery_duration:
      name: "Comfort Recovery Duration"
      description: "Duration to hold comfort recovery temperature before restoring scene"
      default: "00:30:00"
      selector:
        duration:

    # ===========================
    # Scene Restoration Section
    # ===========================
    scene_restore_section:
      section:
        name: "🎬 Scene Restoration"
        description: "Scene to restore after comfort recovery"
        collapsed: true

    restore_scene:
      name: "Restore Scene"
      description: "Scene to restore after all Hilo phases are complete"
      selector:
        entity:
          domain: scene

# ===========================
# Triggers
# ===========================
triggers:
  - platform: state
    entity_id: !input preheat_entity
  - platform: state
    entity_id: !input peak_entity

# ===========================
# Variables
# ===========================
variables:
  # General
  challenge_am: !input challenge_am
  challenge_pm: !input challenge_pm
  skip_am: !input skip_am
  skip_pm: !input skip_pm
  do_pre_heat: !input do_pre_heat

  # Devices
  thermostats: !input thermostats
  water_heater: !input water_heater
  other_switches: !input other_switches

  # Sensors
  preheat_entity: !input preheat_entity
  peak_entity: !input peak_entity

  # Temperatures
  normal_temp: !input normal_temp
  preheat_temp: !input preheat_temp
  challenge_temp_am: !input challenge_temp_am
  challenge_temp_pm: !input challenge_temp_pm
  appreciation_offset: !input appreciation_offset
  recovery_duration: !input recovery_duration

  # Scene
  restore_scene: !input restore_scene

  # Derived
  appreciation_temp: "{{ normal_temp + appreciation_offset }}"
  effective_challenge_temp: >
    {% if challenge_am and is_state(peak_entity, 'on') and not skip_am %}
      {{ challenge_temp_am }}
    {% elif challenge_pm and is_state(peak_entity, 'on') and not skip_pm %}
      {{ challenge_temp_pm }}
    {% else %}
      {{ normal_temp }}
    {% endif %}

# ===========================
# Actions
# ===========================
action:
  - choose:
      # Challenge Phase
      - conditions:
          - condition: state
            entity_id: !input peak_entity
            state: "on"
        sequence:
          - service: climate.set_temperature
            target:
              entity_id: !input thermostats
            data:
              temperature: "{{ effective_challenge_temp }}"
          - choose:
              - conditions: "{{ water_heater | length > 0 }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input water_heater
          - choose:
              - conditions: "{{ other_switches | length > 0 }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input other_switches

      # Preheat Phase
      - conditions:
          - condition: state
            entity_id: !input preheat_entity
            state: "on"
          - condition: template
            value_template: >
              {% if is_state(preheat_entity, 'on') %}
                {% if challenge_am and not skip_am %}
                  true
                {% elif challenge_pm and not skip_pm %}
                  true
                {% else %}
                  false
                {% endif %}
              {% else %}
                false
              {% endif %}
        sequence:
          - service: climate.set_temperature
            target:
              entity_id: !input thermostats
            data:
              temperature: !input preheat_temp
          - choose:
              - conditions: "{{ water_heater | length > 0 }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input water_heater
          - choose:
              - conditions: "{{ other_switches | length > 0 }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input other_switches

    default:
      # Comfort Recovery / Scene Restore
      - choose:
          - conditions:
              - condition: state
                entity_id: !input peak_entity
                state: "off"
          - conditions:
              - condition: template
                value_template: >
                  {% if challenge_am and skip_am %}
                    false
                  {% elif challenge_pm and skip_pm %}
                    false
                  {% else %}
                    true
                  {% endif %}
            sequence:
              - service: climate.set_temperature
                target:
                  entity_id: !input thermostats
                data:
                  temperature: "{{ appreciation_temp }}"
              - choose:
                  - conditions: "{{ water_heater | length > 0 }}"
                    sequence:
                      - service: switch.turn_on
                        target:
                          entity_id: !input water_heater
              - choose:
                  - conditions: "{{ other_switches | length > 0 }}"
                    sequence:
                      - service: switch.turn_on
                        target:
                          entity_id: !input other_switches
              - delay: !input recovery_duration
              - service: scene.turn_on
                target:
                  entity_id: !input restore_scene
