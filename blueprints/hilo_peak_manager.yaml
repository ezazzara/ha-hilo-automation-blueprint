blueprint:
  name: Hilo Challenge Control — Minimal + Skip Toggles + Sections
  description: >
    Simplified Hilo challenge automation with:
    • Preheat, Peak & Recovery phases  
    • Optional toggles to skip AM/PM challenges  
    • Comfort recovery + scene restore  
    • Optional water heater / switches control  
  domain: automation
  min_version: "2024.6.0"

  input:

    # -------- General Settings --------
    general:
      name: General Settings
      description: Basic options for participation and preheat behavior
      input:
        challenge_am:
          name: Participate in AM Challenge
          description: Enable participation in the AM challenge
          default: true
          selector:
            boolean:
        challenge_pm:
          name: Participate in PM Challenge
          description: Enable participation in the PM challenge
          default: true
          selector:
            boolean:
        do_pre_heat:
          name: Enable Preheat Phase
          description: Allow preheating when preheat sensor goes on
          default: true
          selector:
            boolean:

    # -------- Event Sensors --------
    sensors:
      name: Hilo Event Sensors
      description: Sensors that indicate Hilo preheat or peak in progress
      input:
        preheat_sensor:
          name: Preheat Sensor
          description: Binary sensor that turns ON when preheat starts / in progress
          selector:
            entity:
              domain: binary_sensor
        peak_sensor:
          name: Peak In Progress Sensor
          description: Binary sensor that is ON during Hilo peak (challenge) phase
          selector:
            entity:
              domain: binary_sensor

    # -------- Skip Toggles (User Overrides) --------
    skip_toggles:
      name: Skip Toggles (Optional)
      description: Toggle to skip next AM or PM challenge (can be exposed to Apple Home)
      collapsed: false
      input:
        skip_am_boolean:
          name: Skip Next AM Challenge
          description: If ON, the next AM challenge will be skipped
          selector:
            entity:
              domain: input_boolean
        skip_pm_boolean:
          name: Skip Next PM Challenge
          description: If ON, the next PM challenge will be skipped
          selector:
            entity:
              domain: input_boolean

    # -------- Devices to Control --------
    devices:
      name: Thermostats & Switches
      description: Select thermostats and optional switches to control during Hilo events
      input:
        thermostats:
          name: Thermostats
          description: Climate entities to manage during Hilo events
          selector:
            entity:
              domain: climate
              multiple: true
        water_heater:
          name: Water Heater (optional)
          description: Switches to turn off during challenge and re-enable later
          default: []
          selector:
            entity:
              domain: switch
              multiple: true
        other_switches:
          name: Other Switches (optional)
          description: Additional switches to disable during challenge and re-enable later
          default: []
          selector:
            entity:
              domain: switch
              multiple: true

    # -------- Temperature Strategy --------
    temperature:
      name: Temperature Strategy
      description: Set target temperatures for preheat, challenge, and recovery
      input:
        normal_temp:
          name: Normal Temperature (°C)
          description: Base comfort temperature when no Hilo event is active
          default: 21
          selector:
            number:
              min: 10
              max: 30
              step: 0.5
              unit_of_measurement: "°C"
        preheat_temp:
          name: Preheat Temperature (°C)
          description: Temperature to set during preheat phase
          default: 23
          selector:
            number:
              min: 10
              max: 30
              step: 0.5
              unit_of_measurement: "°C"
        challenge_temp:
          name: Challenge Temperature (°C)
          description: Temperature to use during Hilo peak / reduction period
          default: 17
          selector:
            number:
              min: 5
              max: 25
              step: 0.5
              unit_of_measurement: "°C"
        appreciation_offset:
          name: Comfort Recovery Offset (°C)
          description: Offset added to normal temperature for recovery after peak
          default: 2
          selector:
            number:
              min: 0
              max: 10
              step: 0.5
              unit_of_measurement: "°C"
        comfort_recovery_duration:
          name: Recovery Duration
          description: Duration to hold recovery temperature before restoring scene
          default: "00:30:00"
          selector:
            duration:

    # -------- Post-Challenge Scene --------
    post_challenge:
      name: Post‑Challenge Scene
      description: Scene to restore after Hilo events and recovery phase
      input:
        restore_scene:
          name: Scene to Restore
          description: Scene to activate after recovery completes
          selector:
            entity:
              domain: scene

# =========================================================
# TRIGGERS
# =========================================================
triggers:
  - platform: state
    entity_id: !input preheat_sensor
  - platform: state
    entity_id: !input peak_sensor

# =========================================================
# VARIABLES
# =========================================================
variables:
  challenge_am: !input challenge_am
  challenge_pm: !input challenge_pm
  do_pre_heat: !input do_pre_heat
  preheat_sensor: !input preheat_sensor
  peak_sensor: !input peak_sensor
  skip_am: !input skip_am_boolean
  skip_pm: !input skip_pm_boolean
  thermostats: !input thermostats
  water_heater: !input water_heater
  other_switches: !input other_switches
  normal_temp: !input normal_temp
  preheat_temp: !input preheat_temp
  challenge_temp: !input challenge_temp
  appreciation_offset: !input appreciation_offset
  comfort_recovery_duration: !input comfort_recovery_duration
  restore_scene: !input restore_scene

  appreciation_temp: "{{ (normal_temp | float) + (appreciation_offset | float) }}"

  # Decide whether to respect skip toggles (skip AM/PM) when challenge occurs
  effective_challenge_temp: >
    {% if (peak_sensor) %}
      {% if (now().hour >= 6 and now().hour < 10 and skip_am) or
            (now().hour >= 16 and now().hour < 20 and skip_pm) %}
        {{ normal_temp }}
      {% else %}
        {{ challenge_temp }}
      {% endif %}
    {% else %}
      {{ normal_temp }}
    {% endif %}

# =========================================================
# ACTIONS
# =========================================================
action:
  - choose:
      # 1) Challenge / Reduction Phase
      - conditions:
          - condition: state
            entity_id: !input peak_sensor
            state: "on"
        sequence:
          - service: climate.set_temperature
            target:
              entity_id: !input thermostats
            data:
              temperature: "{{ effective_challenge_temp }}"

          - choose:
              - conditions: "{{ water_heater | length > 0 }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input water_heater

          - choose:
              - conditions: "{{ other_switches | length > 0 }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input other_switches

      # 2) Preheat Phase
      - conditions:
          - condition: state
            entity_id: !input preheat_sensor
            state: "on"
          - condition: template
            value_template: "{{ do_pre_heat | bool }}"
        sequence:
          - service: climate.set_temperature
            target:
              entity_id: !input thermostats
            data:
              temperature: !input preheat_temp

          - choose:
              - conditions: "{{ water_heater | length > 0 }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input water_heater

          - choose:
              - conditions: "{{ other_switches | length > 0 }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input other_switches

    default:
      # 3) Recovery → Restore Scene
      - choose:
          - conditions:
              - condition: state
                entity_id: !input peak_sensor
                state: "off"
            sequence:
              - service: climate.set_temperature
                target:
                  entity_id: !input thermostats
                data:
                  temperature: "{{ appreciation_temp }}"

              - choose:
                  - conditions: "{{ water_heater | length > 0 }}"
                    sequence:
                      - service: switch.turn_on
                        target:
                          entity_id: !input water_heater

              - choose:
                  - conditions: "{{ other_switches | length > 0 }}"
                    sequence:
                      - service: switch.turn_on
                        target:
                          entity_id: !input other_switches

              - delay: !input comfort_recovery_duration

              - service: scene.turn_on
                target:
                  entity_id: !input restore_scene
