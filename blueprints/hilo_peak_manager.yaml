blueprint:
  name: Hilo Challenge Control - Dynamic Sensors with Scene Restore (Optimized)
  description: >
    Controls Hilo challenge phases dynamically using your existing sensors.
    Supports preheat, challenge/reduction, comfort recovery, and scene restoration.
  domain: automation

  input:
    # ===========================
    # ⚙️ General Settings
    # ===========================
    _general_section:
      section:
        name: "⚙️ General Settings"
        description: "Enable or skip participation in AM/PM challenges and preheat"
        collapsed: true

    challenge_am:
      name: "Participate in AM Challenge"
      description: "Skip AM challenge if toggled off"
      default: true
      selector:
        boolean:

    challenge_pm:
      name: "Participate in PM Challenge"
      description: "Skip PM challenge if toggled off"
      default: true
      selector:
        boolean:

    skip_am_challenge:
      name: "Skip Next AM Challenge"
      description: "User can opt out of the next AM challenge (resets after challenge ends)"
      default: false
      selector:
        boolean:

    skip_pm_challenge:
      name: "Skip Next PM Challenge"
      description: "User can opt out of the next PM challenge (resets after challenge ends)"
      default: false
      selector:
        boolean:

    do_pre_heat:
      name: "Enable Preheat"
      description: "Activate preheating before challenges"
      default: true
      selector:
        boolean:

    # ===========================
    # 🔗 Hilo Sensors
    # ===========================
    _sensors_section:
      section:
        name: "🔗 Hilo Sensors"
        description: "Sensors detecting preheat and peak events"
        collapsed: true

    preheat_entity:
      name: "Preheat Sensor"
      description: "Binary sensor ON when preheating is in progress"
      selector:
        entity:
          domain: binary_sensor

    peak_entity:
      name: "Peak in Progress Sensor"
      description: "Binary sensor ON during challenge/reduction phase"
      selector:
        entity:
          domain: binary_sensor

    # ===========================
    # 🌡️ Temperature Strategy
    # ===========================
    _temperature_section:
      section:
        name: "🌡️ Temperature Strategy"
        description: "Define temperatures for each phase and comfort recovery"
        collapsed: true

    normal_temp:
      name: "Normal Temperature"
      description: "Base temperature when no challenge is active"
      default: 21
      selector:
        number:
          min: 15
          max: 25
          step: 0.5
          unit_of_measurement: "°C"

    preheat_temp:
      name: "Preheat Temperature"
      description: "Temperature to use during preheat phase"
      default: 23
      selector:
        number:
          min: 15
          max: 25
          step: 0.5
          unit_of_measurement: "°C"

    challenge_temp_am:
      name: "AM Challenge Temperature"
      description: "Temperature during AM Hilo challenge"
      default: 17
      selector:
        number:
          min: 15
          max: 25
          step: 0.5
          unit_of_measurement: "°C"

    challenge_temp_pm:
      name: "PM Challenge Temperature"
      description: "Temperature during PM Hilo challenge"
      default: 17
      selector:
        number:
          min: 15
          max: 25
          step: 0.5
          unit_of_measurement: "°C"

    appreciation_offset:
      name: "Comfort Recovery Offset"
      description: "Added to normal temperature for comfort recovery after peak"
      default: 2
      selector:
        number:
          min: 0
          max: 5
          step: 0.5
          unit_of_measurement: "°C"

    comfort_recovery_duration:
      name: "Comfort Recovery Duration"
      description: "Duration to hold comfort recovery temperature before restoring scene"
      default: "00:30:00"
      selector:
        duration:

    # ===========================
    # 🔥 Devices & Switches
    # ===========================
    _devices_section:
      section:
        name: "🔥 Devices & Switches"
        description: "Thermostats and optional switches to control during challenges"
        collapsed: true

    thermostats:
      name: "Thermostats"
      description: "Thermostats to control during Hilo events"
      selector:
        entity:
          domain: climate
          multiple: true

    water_heater:
      name: "Water Heater (optional)"
      description: "Switch to disable during challenge/reduction phases"
      default: []
      selector:
        entity:
          domain: switch
          multiple: true

    other_switches:
      name: "Other Switches (optional)"
      description: "Additional switches to disable during challenge/reduction"
      default: []
      selector:
        entity:
          domain: switch
          multiple: true

    # ===========================
    # 🎛️ Scene Restoration
    # ===========================
    _scene_section:
      section:
        name: "🎛️ Scene Restoration"
        description: "Scene to restore after all Hilo phases are complete"
        collapsed: true

    restore_scene:
      name: "Restore Scene"
      description: "Scene to restore after comfort recovery"
      selector:
        entity:
          domain: scene

# ===========================
# TRIGGERS
# ===========================
triggers:
  - platform: state
    entity_id: !input preheat_entity
  - platform: state
    entity_id: !input peak_entity

# ===========================
# VARIABLES
# ===========================
variables:
  # Inputs
  challenge_am: !input challenge_am
  challenge_pm: !input challenge_pm
  skip_am_challenge: !input skip_am_challenge
  skip_pm_challenge: !input skip_pm_challenge
  do_pre_heat: !input do_pre_heat
  thermostats: !input thermostats
  water_heater: !input water_heater
  other_switches: !input other_switches
  preheat_entity: !input preheat_entity
  peak_entity: !input peak_entity
  restore_scene: !input restore_scene
  normal_temp: !input normal_temp
  preheat_temp: !input preheat_temp
  challenge_temp_am: !input challenge_temp_am
  challenge_temp_pm: !input challenge_temp_pm
  appreciation_offset: !input appreciation_offset
  comfort_recovery_duration: !input comfort_recovery_duration

  # Derived temperatures
  appreciation_temp: "{{ normal_temp + appreciation_offset }}"

# ===========================
# ACTIONS
# ===========================
action:
  - choose:
      # 1️⃣ Challenge / Reduction Phase
      - conditions:
          - condition: template
            value_template: >
              {% set skip_am = skip_am_challenge and challenge_am %}
              {% set skip_pm = skip_pm_challenge and challenge_pm %}
              {% set is_am = challenge_am %}
              {% set is_pm = challenge_pm %}
              {% set skip = (skip_am and is_am) or (skip_pm and is_pm) %}
              {{ is_state(peak_entity, 'on') and not skip }}
        sequence:
          - service: climate.set_temperature
            target:
              entity_id: "{{ thermostats }}"
            data:
              temperature: >
                {% if challenge_am %}{{ challenge_temp_am }}{% else %}{{ challenge_temp_pm }}{% endif %}
          - choose:
              - conditions: "{{ water_heater | length > 0 }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input water_heater
          - choose:
              - conditions: "{{ other_switches | length > 0 }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input other_switches

      # 2️⃣ Preheat Phase
      - conditions:
          - condition: template
            value_template: >
              {% set skip_am = skip_am_challenge and challenge_am %}
              {% set skip_pm = skip_pm_challenge and challenge_pm %}
              {% set skip = skip_am or skip_pm %}
              {{ is_state(preheat_entity, 'on') and do_pre_heat and not skip }}
        sequence:
          - service: climate.set_temperature
            target:
              entity_id: "{{ thermostats }}"
            data:
              temperature: !input preheat_temp
          - choose:
              - conditions: "{{ water_heater | length > 0 }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input water_heater
          - choose:
              - conditions: "{{ other_switches | length > 0 }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input other_switches

    default:
      # 3️⃣ Comfort Recovery / Restore Scene
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {% set skip_am = skip_am_challenge and challenge_am %}
                  {% set skip_pm = skip_pm_challenge and challenge_pm %}
                  {% set skip = skip_am or skip_pm %}
                  {{ is_state(peak_entity, 'off') and not skip }}
            sequence:
              - service: climate.set_temperature
                target:
                  entity_id: "{{ thermostats }}"
                data:
                  temperature: "{{ appreciation_temp }}"
              - choose:
                  - conditions: "{{ water_heater | length > 0 }}"
                    sequence:
                      - service: switch.turn_on
                        target:
                          entity_id: !input water_heater
              - choose:
                  - conditions: "{{ other_switches | length > 0 }}"
                    sequence:
                      - service: switch.turn_on
                        target:
                          entity_id: !input other_switches
              - delay: !input comfort_recovery_duration
              - service: scene.turn_on
                target:
                  entity_id: !input restore_scene
